name: Update Agent Data

on:
  schedule:
    - cron: '5 0 * * *'  # 00:05 UTC daily
  workflow_dispatch:      # Manual trigger

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          pip install requests pandas pyarrow supabase transformers torch --quiet

      - name: Fetch new data from GitHub
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python scripts/fetch_daily.py

      - name: Classify new repos (CPU)
        run: python scripts/classify_new_repos.py

      - name: Aggregate and upload to Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/upload_to_supabase.py
